    <script>
        // 轻量 Markdown 渲染，避免额外依赖。
        const SimpleMarked = {
            parse(text) {
                const escaped = escapeHtml(text);
                const codeBlockRegex = /```([a-zA-Z0-9_-]+)?(?:\r?\n)?([\s\S]*?)(```|$)/g;
                let html = '';
                let lastIndex = 0;
                let match;

                while ((match = codeBlockRegex.exec(escaped)) !== null) {
                    html += renderInline(escaped.slice(lastIndex, match.index));
                    html += `<pre><code>${match[2]}</code></pre>`;
                    lastIndex = codeBlockRegex.lastIndex;

                    if (match[3] !== '```') {
                        break;
                    }
                }

                html += renderInline(escaped.slice(lastIndex));
                return html.trim();
            }
        };

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function renderInline(text) {
            return text
                    .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                    .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                    .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                    .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                    .replace(/\*(.*)\*/gim, '<em>$1</em>')
                    .replace(/`([^`]+)`/gim, '<code>$1</code>')
                    .split('\n')
                    .join('<br>');
        }
    </script>

        <div id="file-suggestions"></div>
        <div class="input-wrapper">
            <input id="image-input" type="file" accept="image/*,.pdf,.docx,.pptx,.xlsx,.rtf,.odt,.odp,.ods,.epub,.txt,.md,.json,.js,.ts,.tsx,.vue,.html,.css,.scss,.csv,.yaml,.yml" multiple hidden>
            <button id="attach-btn" class="input-icon-btn" title="上传图片或文档">
                <svg class="toolbar-icon" viewBox="0 0 24 24">
                    <path d="M16.5 6.5l-7.8 7.8a2.5 2.5 0 103.5 3.5l8.1-8.1a4.5 4.5 0 00-6.4-6.4L5.5 11.7a6.5 6.5 0 109.2 9.2l6.1-6.1-1.4-1.4-6.1 6.1a4.5 4.5 0 11-6.4-6.4l8.4-8.4a2.5 2.5 0 013.5 3.5l-8.1 8.1a.5.5 0 11-.7-.7l7.8-7.8-1.3-1.3z"/>
                </svg>
            </button>
            <textarea id="user-textarea" placeholder="向智能体提问... (Enter 发送，Ctrl+Enter 换行)"></textarea>
            <button id="send-btn" title="发送" disabled>
                <svg class="toolbar-icon" viewBox="0 0 24 24">
                    <path d="M24 0l-6 22-5-9-11-5zM13 13l4-8-8 6zm-2 2v7l3-4z"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        const scroller = document.getElementById('chat-scroller');
        const textarea = document.getElementById('user-textarea');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const diffBtn = document.getElementById('diff-btn');
        const undoBtn = document.getElementById('undo-btn');
        const attachBtn = document.getElementById('attach-btn');
        const imageInput = document.getElementById('image-input');
        const attachmentTray = document.getElementById('attachment-tray');
        const fileSuggestions = document.getElementById('file-suggestions');
        const todoPanel = document.getElementById('todo-panel');
        const todoList = document.getElementById('todo-list');
        const todoCount = document.getElementById('todo-count');
        const fileTaskPanel = document.getElementById('file-task-panel');
        const fileTaskList = document.getElementById('file-task-list');
        const fileTaskCount = document.getElementById('file-task-count');
        const subagentPanel = document.getElementById('subagent-panel');
        const subagentList = document.getElementById('subagent-list');
        const subagentCount = document.getElementById('subagent-count');
        const runRecovery = document.getElementById('run-recovery');
        const runRecoveryDetail = document.getElementById('run-recovery-detail');
        const resumeRunBtn = document.getElementById('resume-run-btn');
        const discardRunBtn = document.getElementById('discard-run-btn');
        const MAX_HISTORY_ITEMS = 100;
        const MAX_IMAGE_COUNT = 4;
        const MAX_IMAGE_BYTES = 6 * 1024 * 1024;
        const MAX_DOCUMENT_COUNT = 4;
        const MAX_DOCUMENT_BYTES = 10 * 1024 * 1024;
        const sendIcon = '<svg class="toolbar-icon" viewBox="0 0 24 24"><path d="M24 0l-6 22-5-9-11-5zM13 13l4-8-8 6zm-2 2v7l3-4z"/></svg>';
        const stopIcon = '<svg class="toolbar-icon" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>';

        let currentActiveBubble = null;
        let accumulatedText = "";
        let accumulatedReasoning = "";
        let hasReasoningSignal = false;
        let chatHistory = vscode.getState()?.chatHistory ?? [];
        let isGenerating = false;
        let isShowingThinking = false;
        let shouldAutoScroll = true;
        let shouldReasoningAutoScroll = true;
        let isProgrammaticScroll = false;
        let selectedImages = [];
        let selectedDocuments = [];
        let selectedFiles = [];
        let currentFileSuggestions = [];
        let activeSuggestionIndex = 0;
        let mentionSearchTimer = null;

        function isNearBottom() {
            return scroller.scrollHeight - scroller.scrollTop - scroller.clientHeight < 24;
        }

        function scrollToBottomIfNeeded(force = false) {
            if (!force && !shouldAutoScroll) {
                return;
            }

            isProgrammaticScroll = true;
            scroller.scrollTop = scroller.scrollHeight;
            requestAnimationFrame(() => {
                isProgrammaticScroll = false;
            });
        }

        scroller.addEventListener('scroll', () => {
            if (!isGenerating || isProgrammaticScroll) {
                return;
            }

            if (!isNearBottom()) {
                shouldAutoScroll = false;
            }
        });

        function saveHistory() {
            if (chatHistory.length > MAX_HISTORY_ITEMS) {
                chatHistory = chatHistory.slice(-MAX_HISTORY_ITEMS);
            }

            vscode.setState({ chatHistory });
        }

        function setGenerating(value) {
            isGenerating = value;
            sendBtn.innerHTML = isGenerating ? stopIcon : sendIcon;
            sendBtn.title = isGenerating ? '停止' : '发送';
            updateSendButtonState();
        }

        function updateSendButtonState() {
            if (isGenerating || textarea.value.trim().length > 0 || selectedImages.length > 0 || selectedDocuments.length > 0 || selectedFiles.length > 0) {
                sendBtn.removeAttribute('disabled');
            } else {
                sendBtn.setAttribute('disabled', 'true');
            }
        }

        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 140) + 'px';
            updateSendButtonState();
            scheduleFileMentionSearch();
        });

        function handleCommit() {
            if (isGenerating) {
                vscode.postMessage({ command: 'stop-generation' });
                return;
            }

            const text = textarea.value.trim();
            if (!text && selectedImages.length === 0 && selectedDocuments.length === 0 && selectedFiles.length === 0) return;

            const attachments = createMessageAttachments(selectedImages, selectedDocuments, selectedFiles);
            const images = selectedImages.map(image => ({ name: image.name, dataUrl: image.dataUrl }));
            const documents = selectedDocuments.map(document => ({ name: document.name, dataUrl: document.dataUrl }));
            const referencedFiles = [...selectedFiles];
            appendMessage('user', text, true, attachments);
            textarea.value = '';
            textarea.style.height = '38px';
            selectedImages = [];
            selectedDocuments = [];
            selectedFiles = [];
            renderAttachmentTray();
            hideFileSuggestions();
            accumulatedText = "";
            accumulatedReasoning = "";
            hasReasoningSignal = false;
            shouldAutoScroll = true;
            setGenerating(true);
            renderTodos([]);
            renderFileTasks([]);
            renderSubagents([]);
            showWaitingBubble();

            vscode.postMessage({ command: 'user-input', text, images, documents, referencedFiles });
        }

        sendBtn.addEventListener('click', handleCommit);
        clearBtn.addEventListener('click', clearChat);
        diffBtn.addEventListener('click', () => vscode.postMessage({ command: 'show-last-diff' }));
        undoBtn.addEventListener('click', () => vscode.postMessage({ command: 'undo-last-change' }));
        resumeRunBtn.addEventListener('click', () => {
            runRecovery.classList.remove('visible');
            vscode.postMessage({ command: 'resume-run' });
        });

        // 思考区域单独管理滚动；用户向上查看时，不再被后续流式内容拉回底部。
        scroller.addEventListener('scroll', event => {
            const target = event.target;
            if (!(target instanceof HTMLElement) || !target.classList.contains('reasoning-block')) {
                return;
            }
            shouldReasoningAutoScroll = target.scrollHeight - target.scrollTop - target.clientHeight < 12;
        }, true);
        discardRunBtn.addEventListener('click', () => vscode.postMessage({ command: 'discard-run' }));
        attachBtn.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', handleAttachmentSelection);
        textarea.addEventListener('keydown', (e) => {
            if (fileSuggestions.classList.contains('visible')) {
                if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    moveActiveSuggestion(e.key === 'ArrowDown' ? 1 : -1);
                    return;
                }

                if (e.key === 'Enter' && currentFileSuggestions.length > 0) {
                    e.preventDefault();
                    selectSuggestedFile(currentFileSuggestions[activeSuggestionIndex]);
                    return;
                }

                if (e.key === 'Escape') {
                    e.preventDefault();
                    hideFileSuggestions();
                    return;
                }
            }

            if (e.key !== 'Enter') {
                return;
            }

            if (e.ctrlKey || e.metaKey) {
                e.preventDefault();
                insertTextareaNewline();
                return;
            }

            if (!e.shiftKey && !e.altKey) {
                e.preventDefault();
                handleCommit();
            }
        });

        function insertTextareaNewline() {
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const value = textarea.value;

            textarea.value = `${value.slice(0, start)}\n${value.slice(end)}`;
            textarea.selectionStart = start + 1;
            textarea.selectionEnd = start + 1;
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 140) + 'px';
            updateSendButtonState();
        }

        /** 读取用户选择的图片并在输入框上方生成预览。 */
        async function handleAttachmentSelection() {
            const files = Array.from(imageInput.files ?? []);
            imageInput.value = '';

            for (const file of files) {
                if (file.type.startsWith('image/')) {
                    if (selectedImages.length >= MAX_IMAGE_COUNT) {
                        showInputWarning(`一次最多上传 ${MAX_IMAGE_COUNT} 张图片。`);
                        continue;
                    }
                    if (file.size > MAX_IMAGE_BYTES) {
                        showInputWarning(`${file.name} 超过 6MB，请压缩后重新上传。`);
                        continue;
                    }
                    selectedImages.push({
                        id: `${Date.now()}-${Math.random()}`,
                        name: file.name,
                        dataUrl: await readFileAsDataUrl(file)
                    });
                    continue;
                }

                if (!isSupportedDocumentName(file.name)) {
                    showInputWarning(`${file.name} 不是支持的附件格式。`);
                    continue;
                }
                if (selectedDocuments.length >= MAX_DOCUMENT_COUNT) {
                    showInputWarning(`一次最多上传 ${MAX_DOCUMENT_COUNT} 个文档。`);
                    continue;
                }
                if (file.size > MAX_DOCUMENT_BYTES) {
                    showInputWarning(`${file.name} 超过 10MB，请压缩后重新上传。`);
                    continue;
                }
                selectedDocuments.push({
                    id: `${Date.now()}-${Math.random()}`,
                    name: file.name,
                    dataUrl: await readFileAsDataUrl(file)
                });
            }

            renderAttachmentTray();
            updateSendButtonState();
        }

        function isSupportedDocumentName(name) {
            return /\.(pdf|docx|pptx|xlsx|rtf|odt|odp|ods|epub|txt|md|json|jsonc|js|jsx|ts|tsx|vue|html|css|scss|less|xml|yaml|yml|toml|csv|log|py|java|go|rs|php|rb|sh|ps1)$/i.test(name);
        }

        function readFileAsDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result ?? ''));
                reader.onerror = () => reject(reader.error ?? new Error('图片读取失败'));
                reader.readAsDataURL(file);
            });
        }

        /** 渲染待发送的图片和 @ 文件标签。 */
        function renderAttachmentTray() {
            attachmentTray.innerHTML = '';
            attachmentTray.classList.toggle('visible', selectedImages.length > 0 || selectedDocuments.length > 0 || selectedFiles.length > 0);

            for (const image of selectedImages) {
                const chip = document.createElement('div');
                chip.className = 'attachment-chip image';
                chip.title = image.name;
                const preview = document.createElement('img');
                preview.src = image.dataUrl;
                preview.alt = image.name;
                chip.appendChild(preview);
                chip.appendChild(createRemoveButton(() => {
                    selectedImages = selectedImages.filter(item => item.id !== image.id);
                    renderAttachmentTray();
                    updateSendButtonState();
                }));
                attachmentTray.appendChild(chip);
            }

            for (const document of selectedDocuments) {
                const chip = document.createElement('div');
                chip.className = 'attachment-chip';
                chip.title = document.name;
                const name = document.createElement('span');
                name.className = 'attachment-name';
                name.innerText = `文件 ${document.name}`;
                chip.appendChild(name);
                chip.appendChild(createRemoveButton(() => {
                    selectedDocuments = selectedDocuments.filter(item => item.id !== document.id);
                    renderAttachmentTray();
                    updateSendButtonState();
                }));
                attachmentTray.appendChild(chip);
            }

            for (const filePath of selectedFiles) {
                const chip = document.createElement('div');
                chip.className = 'attachment-chip';
                chip.title = filePath;
                const name = document.createElement('span');
                name.className = 'attachment-name';
                name.innerText = `@ ${filePath}`;
                chip.appendChild(name);
                chip.appendChild(createRemoveButton(() => {
                    selectedFiles = selectedFiles.filter(item => item !== filePath);
                    renderAttachmentTray();
                    updateSendButtonState();
                }));
                attachmentTray.appendChild(chip);
            }
        }

        function createRemoveButton(onClick) {
            const button = document.createElement('button');
            button.className = 'attachment-remove';
            button.type = 'button';
            button.title = '移除';
            button.innerText = '×';
            button.addEventListener('click', onClick);
            return button;
        }

        /** 检测光标前的 @ 查询，并向扩展端请求真实工作区文件。 */
        function scheduleFileMentionSearch() {
            clearTimeout(mentionSearchTimer);
            const mention = getActiveMention();
            if (!mention) {
                hideFileSuggestions();
                return;
            }

            mentionSearchTimer = setTimeout(() => {
                vscode.postMessage({ command: 'search-files', query: mention.query });
            }, 120);
        }

        function getActiveMention() {
            const cursor = textarea.selectionStart;
            const beforeCursor = textarea.value.slice(0, cursor);
            const match = beforeCursor.match(/(^|\s)@([^\s@]*)$/);
            if (!match) {
                return null;
            }

            return {
                query: match[2],
                start: beforeCursor.length - match[2].length - 1,
                end: cursor
            };
        }

        function renderFileSuggestions(items) {
            const mention = getActiveMention();
            currentFileSuggestions = mention ? items.filter(item => !selectedFiles.includes(item)) : [];
            activeSuggestionIndex = 0;
            fileSuggestions.innerHTML = '';

            if (currentFileSuggestions.length === 0) {
                hideFileSuggestions();
                return;
            }

            currentFileSuggestions.forEach((filePath, index) => {
                const row = document.createElement('div');
                row.className = `file-suggestion${index === 0 ? ' active' : ''}`;
                row.title = filePath;
                row.innerHTML = `<span>＠</span><span class="file-suggestion-path">${escapeHtml(filePath)}</span>`;
                row.addEventListener('mousedown', event => {
                    event.preventDefault();
                    selectSuggestedFile(filePath);
                });
                fileSuggestions.appendChild(row);
            });
            fileSuggestions.classList.add('visible');
        }

        function moveActiveSuggestion(offset) {
            if (currentFileSuggestions.length === 0) return;
            activeSuggestionIndex = (activeSuggestionIndex + offset + currentFileSuggestions.length) % currentFileSuggestions.length;
            [...fileSuggestions.children].forEach((row, index) => {
                row.classList.toggle('active', index === activeSuggestionIndex);
            });
            fileSuggestions.children[activeSuggestionIndex]?.scrollIntoView({ block: 'nearest' });
        }

        function selectSuggestedFile(filePath) {
            const mention = getActiveMention();
            if (!mention) return;

            const value = textarea.value;
            textarea.value = `${value.slice(0, mention.start)}${value.slice(mention.end)}`;
            textarea.selectionStart = mention.start;
            textarea.selectionEnd = mention.start;
            if (!selectedFiles.includes(filePath)) {
                selectedFiles.push(filePath);
            }
            hideFileSuggestions();
            renderAttachmentTray();
            updateSendButtonState();
            textarea.focus();
        }

        function hideFileSuggestions() {
            currentFileSuggestions = [];
            activeSuggestionIndex = 0;
            fileSuggestions.innerHTML = '';
            fileSuggestions.classList.remove('visible');
        }

        function showInputWarning(text) {
            vscode.postMessage({ command: 'show-warning', text });
        }

        function createMessageAttachments(images, documents, files) {
            return [
                ...images.map(image => ({ kind: 'image', name: image.name, dataUrl: image.dataUrl })),
                ...documents.map(document => ({ kind: 'document', name: document.name })),
                ...files.map(filePath => ({ kind: 'file', name: filePath }))
            ];
        }

        /** 历史记录不保存大体积 Base64，只保留图片名称和文件引用。 */
        function createPersistedAttachments(attachments) {
            return attachments.map(item => ({ kind: item.kind, name: item.name }));
        }

        function renderMessageAttachments(container, attachments) {
            if (!attachments?.length) return;
            const wrapper = document.createElement('div');
            wrapper.className = 'message-attachments';

            for (const item of attachments) {
                if (item.kind === 'image' && item.dataUrl) {
                    const image = document.createElement('img');
                    image.className = 'message-image';
                    image.src = item.dataUrl;
                    image.alt = item.name;
                    image.title = item.name;
                    wrapper.appendChild(image);
                    continue;
                }

                const chip = document.createElement('span');
                chip.className = 'message-file';
                chip.title = item.name;
                chip.innerText = item.kind === 'image'
                    ? `图片: ${item.name}`
                    : item.kind === 'document' ? `文件: ${item.name}` : `@ ${item.name}`;
                wrapper.appendChild(chip);
            }
            container.appendChild(wrapper);
        }

        function appendMessage(role, text, shouldSave = false, attachments = []) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;
            
            const label = document.createElement('div');
            label.className = 'message-label';
            label.innerText = role === 'user' ? '你' : '灵境';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            if (role === 'agent') {
                bubble.innerHTML = SimpleMarked.parse(text);
            } else {
                renderMessageAttachments(bubble, attachments);
                const textElement = document.createElement('div');
                textElement.innerText = text || '请查看附件';
                bubble.appendChild(textElement);
            }

            row.appendChild(label);
            row.appendChild(bubble);
            scroller.appendChild(row);
            scrollToBottomIfNeeded();

            if (shouldSave) {
                chatHistory.push({ role, text, attachments: createPersistedAttachments(attachments) });
                saveHistory();
            }
        }

        function appendWelcomeMessage() {
            const row = document.createElement('div');
            row.className = 'message-row agent';

            const label = document.createElement('div');
            label.className = 'message-label';
            label.innerText = '灵境';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerText = '你好！我是你的开发助手，有什么我可以帮你的？';

            row.appendChild(label);
            row.appendChild(bubble);
            scroller.appendChild(row);
        }

        function renderTodos(items) {
            todoList.innerHTML = '';
            todoCount.innerText = '';

            if (!items || items.length === 0) {
                todoPanel.classList.remove('visible');
                return;
            }

            todoPanel.classList.add('visible');
            const completedCount = items.filter(item => item.status === 'completed').length;
            todoCount.innerText = `${completedCount}/${items.length}`;

            for (const item of items) {
                const row = document.createElement('div');
                row.className = `todo-item ${item.status}`;

                const dot = document.createElement('span');
                dot.className = 'todo-dot';

                const title = document.createElement('span');
                title.className = 'todo-text';
                title.innerText = item.title;

                const state = document.createElement('span');
                state.className = 'todo-state';
                state.innerText = getTodoStateText(item.status);

                row.appendChild(dot);
                row.appendChild(title);
                row.appendChild(state);
                todoList.appendChild(row);
            }
        }

        function renderFileTasks(items) {
            fileTaskList.innerHTML = '';
            fileTaskCount.innerText = '';
            if (!items?.length) {
                fileTaskPanel.classList.remove('visible');
                return;
            }

            fileTaskPanel.classList.add('visible');
            const finishedCount = items.filter(item => item.status === 'completed' || item.status === 'failed').length;
            fileTaskCount.innerText = `${finishedCount}/${items.length}`;

            for (const item of items) {
                const row = document.createElement('div');
                const visualStatus = item.status === 'failed' ? 'completed' : item.status;
                row.className = `todo-item ${visualStatus}`;
                row.title = item.note ? `${item.path}\n${item.note}` : item.path;

                const dot = document.createElement('span');
                dot.className = 'todo-dot';
                const title = document.createElement('span');
                title.className = 'todo-text';
                title.innerText = item.path;
                const state = document.createElement('span');
                state.className = 'todo-state';
                state.innerText = item.status === 'failed' ? '失败' : getTodoStateText(item.status);
                row.append(dot, title, state);
                fileTaskList.appendChild(row);
            }
        }

        function getTodoStateText(status) {
            if (status === 'completed') {
                return '完成';
            }

            if (status === 'in_progress') {
                return '正在执行';
            }

            return '等待';
        }

        function ensureAgentBubble() {
            if (currentActiveBubble) {
                return;
            }

            const row = document.createElement('div');
            row.className = 'message-row agent';

            const label = document.createElement('div');
            label.className = 'message-label';
            label.innerText = '灵境';

            currentActiveBubble = document.createElement('div');
            currentActiveBubble.className = 'message-bubble streaming-active';

            row.appendChild(label);
            row.appendChild(currentActiveBubble);
            scroller.appendChild(row);
        }

        function showWaitingBubble() {
            ensureAgentBubble();
            currentActiveBubble.innerHTML = '<span class="waiting-text">正在等待模型响应<span class="waiting-dot">...</span></span>';
            scrollToBottomIfNeeded();
        }

        function clearWaitingBubble() {
            if (accumulatedText.length === 0 && !isShowingThinking && currentActiveBubble) {
                currentActiveBubble.innerHTML = '';
            }
        }

        function clearChat() {
            if (isGenerating) {
                vscode.postMessage({ command: 'stop-generation' });
            }

            chatHistory = [];
            accumulatedText = "";
            accumulatedReasoning = "";
            hasReasoningSignal = false;
            currentActiveBubble = null;
            shouldAutoScroll = true;
            shouldReasoningAutoScroll = true;
            selectedImages = [];
            selectedDocuments = [];
            selectedFiles = [];
            renderAttachmentTray();
            hideFileSuggestions();
            saveHistory();
            vscode.postMessage({ command: 'clear-history' });
            renderTodos([]);
            renderFileTasks([]);

            scroller.innerHTML = '';
            appendWelcomeMessage();
        }

        function restoreHistory() {
            for (const item of chatHistory) {
                appendMessage(item.role, item.text, false, item.attachments ?? []);
            }
        }

        restoreHistory();
        vscode.postMessage({ command: 'webview-ready' });

        window.addEventListener('message', event => {
            const msg = event.data;

            if (msg.command === 'stream-start') {
                setGenerating(true);
                accumulatedText = "";
                accumulatedReasoning = "";
                hasReasoningSignal = false;
                isShowingThinking = false;
                shouldAutoScroll = true;
                shouldReasoningAutoScroll = true;
                showWaitingBubble();
            } 
            else if (msg.command === 'todo-update') {
                renderTodos(msg.items);
            }
            else if (msg.command === 'file-suggestions') {
                renderFileSuggestions(msg.items ?? []);
            }
            else if (msg.command === 'file-task-update') {
                renderFileTasks(msg.items ?? []);
            }
            else if (msg.command === 'run-state-update') {
                renderRunState(msg.state);
                renderSubagents(msg.state?.subagents ?? []);
            }
            else if (msg.command === 'stream-chunk') {
                consumeStreamChunk(String(msg.text ?? ''));
                renderActiveAgentBubble();
                scrollToBottomIfNeeded();
            } 
            else if (msg.command === 'stream-end') {
                if (currentActiveBubble) {
                    currentActiveBubble.classList.remove('streaming-active');
                    currentActiveBubble = null;
                    if (accumulatedText.trim().length > 0) {
                        chatHistory.push({ role: 'agent', text: accumulatedText });
                        saveHistory();
                    }
                    accumulatedText = "";
                    accumulatedReasoning = "";
                    hasReasoningSignal = false;
                    isShowingThinking = false;
                }
                setGenerating(false);
                shouldAutoScroll = true;
            }
        });

        function renderRunState(state) {
            const resumable = state && ['paused', 'failed', 'cancelled'].includes(state.status);
            runRecovery.classList.toggle('visible', Boolean(resumable));
            if (!resumable) {
                runRecoveryDetail.textContent = '';
                return;
            }
            const statusText = state.status === 'paused' ? '已暂停' : state.status === 'cancelled' ? '已取消' : '执行失败';
            const completed = (state.plan ?? []).filter(item => item.status === 'completed').length;
            const total = (state.plan ?? []).length;
            runRecoveryDetail.textContent = `${statusText} · 第 ${state.iteration ?? 0} 轮 · 计划 ${completed}/${total}：${state.task ?? ''}`;
        }

        function renderSubagents(items) {
            const safeItems = Array.isArray(items) ? items : [];
            subagentList.innerHTML = '';
            subagentPanel.classList.toggle('visible', safeItems.length > 0);
            subagentCount.textContent = safeItems.length > 0
                ? `${safeItems.filter(item => item.status === 'completed').length}/${safeItems.length}`
                : '';

            for (const item of safeItems) {
                const row = document.createElement('div');
                const visualStatus = item.status === 'running' ? 'in_progress' : item.status === 'failed' ? 'completed' : 'completed';
                row.className = `todo-item ${visualStatus}`;
                const marker = document.createElement('span');
                marker.className = 'todo-dot';
                const label = document.createElement('span');
                label.className = 'todo-text';
                label.textContent = `${item.role}: ${item.task}`;
                row.title = item.summary ?? '';
                const state = document.createElement('span');
                state.className = 'todo-state';
                state.textContent = item.status === 'running' ? '协作中' : item.status === 'failed' ? '失败' : '完成';
                row.append(marker, label, state);
                subagentList.appendChild(row);
            }
        }

        function consumeStreamChunk(chunk) {
            const reasoningMarker = '__SOUL_BLEACH_REASONING__';
            const thinkingMarker = '__SOUL_BLEACH_THINKING__';
            let text = chunk;

            ensureAgentBubble();
            clearWaitingBubble();

            while (text.length > 0) {
                const reasoningIndex = text.indexOf(reasoningMarker);
                const thinkingIndex = text.indexOf(thinkingMarker);
                const markerIndexes = [reasoningIndex, thinkingIndex].filter(index => index >= 0);
                const nextMarkerIndex = markerIndexes.length > 0 ? Math.min(...markerIndexes) : -1;

                if (nextMarkerIndex === -1) {
                    appendAnswerText(text);
                    return;
                }

                if (nextMarkerIndex > 0) {
                    appendAnswerText(text.slice(0, nextMarkerIndex));
                    text = text.slice(nextMarkerIndex);
                    continue;
                }

                if (text.startsWith(thinkingMarker)) {
                    isShowingThinking = true;
                    hasReasoningSignal = true;
                    text = text.slice(thinkingMarker.length);
                    continue;
                }

                if (text.startsWith(reasoningMarker)) {
                    isShowingThinking = true;
                    hasReasoningSignal = true;
                    text = text.slice(reasoningMarker.length);

                    const nextThinkingIndex = text.indexOf(thinkingMarker);
                    const nextReasoningIndex = text.indexOf(reasoningMarker);
                    const nextIndexes = [nextThinkingIndex, nextReasoningIndex].filter(index => index >= 0);
                    const nextIndex = nextIndexes.length > 0 ? Math.min(...nextIndexes) : -1;
                    const reasoningText = nextIndex === -1 ? text : text.slice(0, nextIndex);

                    accumulatedReasoning += reasoningText;
                    text = nextIndex === -1 ? '' : text.slice(nextIndex);
                    continue;
                }
            }
        }

        function appendAnswerText(text) {
            if (!text) {
                return;
            }

            if (isShowingThinking && accumulatedText.length === 0) {
                isShowingThinking = false;
            }

            accumulatedText += text;
        }

        function renderActiveAgentBubble() {
            const parts = [];
            const previousReasoningBlock = currentActiveBubble.querySelector('.reasoning-block');
            const previousReasoningScrollTop = previousReasoningBlock?.scrollTop ?? 0;

            if (hasReasoningSignal || accumulatedReasoning.trim().length > 0) {
                const reasoningHtml = accumulatedReasoning.trim().length > 0
                    ? escapeHtml(accumulatedReasoning).trim()
                    : '<span class="waiting-text">思考中...</span>';
                parts.push([
                    '<div class="reasoning-block">',
                    '<div class="reasoning-title">思考过程</div>',
                    reasoningHtml,
                    '</div>'
                ].join(''));
            }

            parts.push(`<div class="answer-block">${SimpleMarked.parse(accumulatedText)}</div>`);
            currentActiveBubble.innerHTML = parts.join('');
            const reasoningBlock = currentActiveBubble.querySelector('.reasoning-block');
            if (reasoningBlock && shouldReasoningAutoScroll) {
                reasoningBlock.scrollTop = reasoningBlock.scrollHeight;
            } else if (reasoningBlock) {
                reasoningBlock.scrollTop = previousReasoningScrollTop;
            }
        }
    </script>
</body>
</html>
